listen=YES
listen_ipv6=NO

anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022

dirmessage_enable=YES
use_localtime=YES
xferlog_enable=YES
connect_from_port_20=YES

chroot_local_user=YES
allow_writeable_chroot=YES
secure_chroot_dir=/var/run/vsftpd/empty

local_root=/var/www/ftp/wordpress

pasv_enable=YES
pasv_min_port=21000
pasv_max_port=21010
pasv_address=0.0.0.0
pasv_addr_resolve=NO

max_clients=10
max_per_ip=5

file_open_mode=0666

xferlog_file=/var/log/vsftpd.log
log_ftp_protocol=YES

utf8_filesystem=YES

seccomp_sandbox=NO