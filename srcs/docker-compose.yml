name: inception

services:
  nginx:
    container_name: nginx
    networks:
      - inception
    depends_on:
      - wordpress
      - portainer
    build:
      context: nginx
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - wordpress:/var/www/wordpress
      - adminer:/var/www/adminer
    ports:
      - "443:443"
    restart: on-failure
  mariadb:
    container_name: mariadb
    networks:
      - inception
    build:
      context: mariadb
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - mariadb:/var/lib/mysql
    restart: on-failure
    expose:
      - "3306"
    secrets:
      - db_pw
  wordpress:
    container_name: wordpress
    networks:
      - inception
    depends_on:
      - mariadb
      - redis
    build:
      context: wordpress
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - wordpress:/var/www/wordpress
    restart: on-failure
    expose:
      - "9000"
    secrets:
      - db_pw
      - wp_admin_pw
      - wp_user_pw
  redis:
    container_name: redis
    networks:
      - inception
    build:
      context: bonus/redis
      dockerfile: Dockerfile
    restart: on-failure
    expose:
      - "6379"
  adminer:
    container_name: adminer
    networks:
      - inception
    build:
      context: bonus/adminer
      dockerfile: Dockerfile
    volumes:
      - adminer:/var/www/adminer
    restart: on-failure
    expose:
      - "9001"
  ftp:
    container_name: ftp-server
    networks:
      - inception
    build:
      context: bonus/FTP
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - wordpress:/var/www/ftp/wordpress
    restart: on-failure
    ports:
      - "21:21"
      - "21000-21010:21000-21010"
    secrets:
      - ftp_pw
  static-site:
    container_name: static-site
    networks:
      - inception
    build:
      context: bonus/static-site
      dockerfile: Dockerfile
    restart: on-failure
    expose:
      - "80"
  portainer:
    container_name: portainer
    networks:
      - inception
    build:
      context: bonus/portainer
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer:/data
    restart: on-failure
    expose:
      - "9000"

volumes:
  wordpress:
    name: wordpress
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/igrousso/data/wordpress'
  mariadb:
    name: mariadb
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/igrousso/data/mariadb'
  adminer:
    name: adminer
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/igrousso/data/adminer'
  portainer:
    name: portainer
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/igrousso/data/portainer'

networks:
  inception:
    driver: bridge

secrets:
  db_pw:
    file: '../secrets/db_pw'
  ftp_pw:
    file: '../secrets/ftp_pw'
  wp_admin_pw:
    file: '../secrets/wp_admin_pw'
  wp_user_pw:
    file: '../secrets/wp_user_pw'
